stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 5m

# Disable metrics-generator to avoid "empty ring" errors in single-instance mode
metrics_generator:
  ring:
    kvstore:
      store: inmemory
  storage:
    path: /var/tempo/metrics
    remote_write: []

overrides:
  defaults:
    metrics_generator:
      processors: []

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
